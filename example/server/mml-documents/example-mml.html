<script>
  const stairs = document.getElementById("stairs");

  function getHexForCurrentTime(lightness) {
    const hue = ((Date.now() % 2000)/2000) * 360;
    const saturation = 1.0;
    const alpha = saturation * Math.min(lightness, 1 - lightness);
    const getF = number => {
      const k = (number + hue / 30) % 12;
      return lightness - alpha * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)))
    };
    const red = Math.round(255 * getF(0));
    const green = Math.round(255 * getF(8));
    const blue = Math.round(255 * getF(4));
    const hex = "#"+(red.toString(16).padStart(2, "0"))+(green.toString(16).padStart(2, "0"))+(blue.toString(16).padStart(2, "0"));
    return hex;
  }

  const stairsDuration = 4000;
  const numOfSteps = 16;
  const stepDepth = 0.5;
  const stepHeight = 0.2;

  for (let i = 0; i < numOfSteps; i++) {
    const stair = document.createElement("m-cube");
    stair.setAttribute("width", 2);
    stair.setAttribute("height", stepHeight);
    stair.setAttribute("depth", stepDepth);
    stair.setAttribute("color", "blue");
    stair.setAttribute("collision-interval","1000");
    stair.addEventListener("collisionstart", () => {
      stair.setAttribute("color", "white");
    });
    stair.addEventListener("collisionend", () => {
      stair.setAttribute("color", getHexForCurrentTime(0.5));
    });
    stairs.append(stair);

    const yAnimation = document.createElement("m-attr-anim");
    yAnimation.setAttribute("attr", "y");
    yAnimation.setAttribute("start-time", -i*(stairsDuration/numOfSteps));
    // yAnimation.setAttribute("pause-time", 0);
    yAnimation.setAttribute("start", -stepHeight);
    yAnimation.setAttribute("end", (numOfSteps-1)*stepHeight);
    yAnimation.setAttribute("duration", stairsDuration);
    stair.append(yAnimation);

    const zAnimation =document.createElement("m-attr-anim");
    zAnimation.setAttribute("attr", "z");
    zAnimation.setAttribute("start-time", -i*(stairsDuration/numOfSteps));
    // zAnimation.setAttribute("pause-time", 0);
    zAnimation.setAttribute("start", -stepDepth);
    zAnimation.setAttribute("end", (numOfSteps-1)*stepDepth);
    zAnimation.setAttribute("duration", stairsDuration);
    stair.append(zAnimation);
  }
</script>
